# Ultralytics 🚀 AGPL-3.0 License - https://ultralytics.com/license

name: ultralytics_yolo
description: Flutter plugin for Ultralytics YOLO computer vision models.
version: 0.3.0
homepage: https://github.com/ultralytics/yolo-flutter-app
repository: https://github.com/ultralytics/yolo-flutter-app
issue_tracker: https://github.com/ultralytics/yolo-flutter-app/issues

topics:
  - computer-vision
  - object-detection
  - yolo
  - machine-learning
  - flutter-plugin

funding:
  - https://github.com/sponsors/ultralytics

environment:
  sdk: ^3.8.1
  flutter: ">=3.32.1"

dependencies:
  archive: ^4.0.7
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  coverage: ^1.15.0
  flutter_lints: ">=5.0.0 <7.0.0"
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4
  very_good_analysis: ">=6.0.0 <11.0.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.ultralytics.yolo
        pluginClass: YOLOPlugin
      ios:
        pluginClass: YOLOPlugin
