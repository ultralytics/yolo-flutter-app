name: Export QNN Assets

permissions:
  contents: read

on:
  push:
    branches: [benchmark/pixel-10-models]
    paths:
      - ".github/workflows/export-qnn-assets.yml"
      - "scripts/export-qnn-models.py"

jobs:
  export:
    runs-on: windows-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        task: [detect, segment, semantic, depth, classify, pose, obb]
        architecture: ["73", "81"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7

      - name: Install export dependencies
        shell: pwsh
        run: |
          uv venv
          uv pip install --python .venv\Scripts\python.exe --index-url https://download.pytorch.org/whl/cpu torch torchvision
          uv pip install --python .venv\Scripts\python.exe "ultralytics[export] @ git+https://github.com/ultralytics/ultralytics.git@51f2ab4f1eb7bc3e36c95283fb17ef8d9c85548c"
          uv pip install --python .venv\Scripts\python.exe onnxruntime-qnn==2.2.0

      - name: Export QNN asset
        shell: pwsh
        run: >
          .venv\Scripts\python.exe scripts/export-qnn-models.py
          --tasks ${{ matrix.task }}
          --architectures ${{ matrix.architecture }}

      - uses: actions/upload-artifact@v6
        with:
          name: qnn-${{ matrix.task }}-v${{ matrix.architecture }}
          path: exports/yolo26-qnn/release-assets/*.onnx
          if-no-files-found: error
