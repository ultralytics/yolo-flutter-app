# Continuous Integration (CI) GitHub Actions tests

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Dart publish dry-run
        run: dart pub publish --dry-run

      - name: Upload Coverage Reports to CodeCov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: coverage/lcov.info
          disable_search: true
          plugins: noop
          name: flutter-codecov
          verbose: false

  example-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build example Android app
        working-directory: example
        run: flutter build apk --debug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch smoke test (Android emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          working-directory: example
          script: |
            set -eux
            adb install -r -t build/app/outputs/flutter-apk/app-debug.apk
            adb shell pm grant com.ultralytics.yolo android.permission.CAMERA || true
            adb shell am start -n com.ultralytics.yolo/.MainActivity
            sleep 10
            adb shell pidof com.ultralytics.yolo
            adb shell dumpsys activity activities | grep com.ultralytics.yolo

  example-ios:
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build example iOS app
        working-directory: example
        run: flutter build ios --simulator --no-codesign

      - name: Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/{print $2; exit}')
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Launch smoke test (iOS Simulator)
        working-directory: example
        run: flutter test integration_test/app_launch_test.dart -d "$SIMULATOR_UDID"
