plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}
def hasReleaseSigning = keystoreProperties["storeFile"] &&
    (keystoreProperties["keyAlias"] ?: System.getenv("ANDROID_KEY_ALIAS")) &&
    (keystoreProperties["keyPassword"] ?: System.getenv("ANDROID_KEY_PASSWORD")) &&
    (keystoreProperties["storePassword"] ?: System.getenv("ANDROID_STORE_PASSWORD"))

android {
    namespace = "com.ultralytics.yolo"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.ultralytics.yolo"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties["keyAlias"] ?: System.getenv("ANDROID_KEY_ALIAS")
            keyPassword = keystoreProperties["keyPassword"] ?: System.getenv("ANDROID_KEY_PASSWORD")
            storeFile = keystoreProperties["storeFile"] ? rootProject.file(keystoreProperties["storeFile"]) : null
            storePassword = keystoreProperties["storePassword"] ?: System.getenv("ANDROID_STORE_PASSWORD")
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    lint {
        checkReleaseBuilds false
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Snapdragon NPU support for QNN context-binary ONNX models (*_qnn.onnx). The plugin declares this compileOnly;
    // apps opt in to the ~70MB arm64 runtime by adding it here.
    implementation("com.microsoft.onnxruntime:onnxruntime-android-qnn:1.26.0")
}

// Bundle the nano YOLO models into the app at build time. They are NOT committed to git (large binaries, gitignored);
// this fetches them into example/assets/models/ before assets are merged so the app ships with them by default. The
// resolver checks assets/models/ before downloading, so a bundled model means no first-run network fetch. Best-effort:
// the script always exits 0, so an offline build still succeeds and simply falls back to the runtime download.
tasks.register("fetchBundledModels", Exec) {
    workingDir = rootProject.projectDir
    commandLine "bash", "${rootProject.projectDir}/../../scripts/fetch_bundled_models.sh", "android"
    ignoreExitValue = true
}
tasks.matching { it.name == "preBuild" }.configureEach { dependsOn("fetchBundledModels") }
