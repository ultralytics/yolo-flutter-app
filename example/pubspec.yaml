name: ultralytics_yolo_example
description: "Demonstrates how to use the ultralytics_yolo plugin."
publish_to: "none"

environment:
  sdk: ^3.8.1
  flutter: ">=3.32.1"

dependencies:
  archive: ^4.0.9
  cupertino_icons: ^1.0.9
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  http: ^1.6.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  ultralytics_yolo:
    path: ../

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/models/
    - assets/logo.png
    - assets/applogo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/applogo.png"
